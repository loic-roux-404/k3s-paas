name: 'Test Terraform'

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**.hcl'
      - 'terraform/**.tf'
      - 'terraform/**.tfvars'
      - 'terraform/**.tmpl'
      - .github/workflows/test-terraform.yml

permissions:
  pull-requests: write

jobs:
  tf-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v2

      - name: &init Terraform Init
        id: init
        run: terraform init

      - name: &fmt Terraform fmt
        id: fmt
        run: terraform fmt -check -diff

      - name: &validate Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Init Libvirt
        <<: *init

      - name: Terraform fmt Libvirt
        <<: *fmt
        
      - name: Terraform Validate Libvirt
        <<: *validate
